services:
  db:
    image: postgres:15

    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
        - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - Synapse-network
  redis:
    image: redis:7

    ports:
      - "6379:6379"
    networks:
      - Synapse-network
  backend:
    build: ./backend

    env_file:
      - .env

    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./keys:/app/keys
    networks:
       - Synapse-network

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
    - Synapse-network
volumes:
    pgdata:

networks:
    Synapse-network: